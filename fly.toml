app = 'ielts-study-tracker'
primary_region = 'sin'

[build]

[env]
  DB_PATH = '/app/data/tracker.db'
  TRACKER_PASSWORD = 'ielts7'

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'tracker_data'
  destination = '/app/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
